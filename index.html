    :root {
        --bg-deep: #0b1120;
        --bg-card: #111827;
        --bg-surface: #1e293b;
        --bg-hover: #263349;
        --accent: #34d399;
        --accent-dim: rgba(52, 211, 153, 0.12);
        --accent-glow: rgba(52, 211, 153, 0.35);
        --warn: #f87171;
        --warn-dim: rgba(248, 113, 113, 0.12);
        --lock-color: #fbbf24;
        --lock-dim: rgba(251, 191, 36, 0.12);
        --text-primary: #f1f5f9;
        --text-secondary: #94a3b8;
        --text-muted: #475569;
        --border: rgba(255,255,255,0.06);
        --radius: 12px;
        --stroke-color: rgba(52, 211, 153, 0.45);
        --stroke-width: 40;
    }

    * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    html, body { height:100%; overflow:hidden; }
    body {
        font-family: 'DM Sans', sans-serif;
        background: var(--bg-deep);
        color: var(--text-primary);
        touch-action: none;
        overscroll-behavior: none;
    }

    /* ─── APP SHELL ─── */
    .app { display:flex; flex-direction:column; height:100dvh; position:relative; }

    /* ─── HEADER ─── */
    .header {
        flex-shrink: 0;
        padding: 10px 16px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        background: var(--bg-card);
        border-bottom: 1px solid var(--border);
        z-index: 20;
    }
    .header-title {
        font-family: 'DM Mono', monospace;
        font-size: 15px;
        font-weight: 500;
        letter-spacing: 0.08em;
        color: var(--accent);
    }
    .header-sub {
        font-size: 11px;
        color: var(--text-muted);
        margin-top: 1px;
    }
    .header-actions { display:flex; gap:6px; }

    .icon-btn {
        width: 38px; height: 38px;
        border: 1px solid var(--border);
        border-radius: 10px;
        background: var(--bg-surface);
        color: var(--text-secondary);
        font-size: 16px;
        display: flex; align-items: center; justify-content: center;
        cursor: pointer;
        transition: all 0.15s;
    }
    .icon-btn:active { background: var(--bg-hover); transform: scale(0.93); }
    .icon-btn.danger { border-color: rgba(248,113,113,0.2); color: var(--warn); }
    .icon-btn.danger:active { background: var(--warn-dim); }

    /* ─── PHASE INDICATOR ─── */
    .phase-bar {
        flex-shrink: 0;
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 8px 16px;
        background: var(--bg-card);
        border-bottom: 1px solid var(--border);
        font-size: 12px;
    }
    .phase-step {
        display: flex; align-items: center; gap: 5px;
        color: var(--text-muted);
        transition: color 0.3s;
    }
    .phase-step.active { color: var(--accent); }
    .phase-step.done { color: var(--text-secondary); }
    .phase-dot {
        width: 7px; height: 7px;
        border-radius: 50%;
        background: var(--text-muted);
        transition: background 0.3s, box-shadow 0.3s;
    }
    .phase-step.active .phase-dot {
        background: var(--accent);
        box-shadow: 0 0 8px var(--accent-glow);
    }
    .phase-step.done .phase-dot { background: var(--text-secondary); }
    .phase-sep { color: var(--text-muted); font-size: 10px; }

    /* ─── CANVAS / IMAGE AREA ─── */
    .canvas-area {
        flex: 1;
        position: relative;
        overflow: hidden;
        background: var(--bg-deep);
        display: flex;
        align-items: center;
        justify-content: center;
    }

    /* Upload prompt */
    .upload-prompt {
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 20px;
        z-index: 5;
        touch-action: auto; /* allow taps here */
    }
    .upload-prompt.hidden { display: none; }

    .upload-ring {
        width: 96px; height: 96px;
        border-radius: 50%;
        border: 2px dashed var(--text-muted);
        display: flex; align-items: center; justify-content: center;
        font-size: 36px;
        color: var(--text-muted);
    }
    .upload-label {
        font-size: 16px; font-weight: 500; color: var(--text-secondary);
    }
    .upload-hint {
        font-size: 12px; color: var(--text-muted); text-align: center; line-height: 1.5;
    }
    .upload-buttons {
        display: flex;
        gap: 12px;
        margin-top: 4px;
    }
    .upload-btn {
        padding: 14px 24px;
        border-radius: 12px;
        border: none;
        font-family: 'DM Sans', sans-serif;
        font-size: 15px;
        font-weight: 600;
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 8px;
        transition: all 0.15s;
        touch-action: manipulation; /* explicit tap handling */
    }
    .upload-btn:active { transform: scale(0.95); }
    .upload-btn.camera {
        background: var(--accent);
        color: #0b1120;
    }
    .upload-btn.library {
        background: var(--bg-surface);
        color: var(--text-secondary);
        border: 1px solid var(--border);
    }

    /* Image display */
    #imageContainer {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
    }
    #imageContainer.hidden { display: none; }

    #imagePreview {
        max-width: 100%; max-height: 100%;
        object-fit: contain;
        transform-origin: center center;
        transition: none;
        user-select: none;
        -webkit-user-drag: none;
    }

    /* Rotation controls */
    .rotate-controls {
        position: absolute;
        bottom: 12px;
        left: 12px;
        display: flex;
        gap: 6px;
        z-index: 10;
    }
    .rotate-controls.hidden { display: none; }

    .rotate-btn {
        width: 44px; height: 44px;
        border-radius: 10px;
        border: 1px solid rgba(255,255,255,0.12);
        background: rgba(0,0,0,0.6);
        backdrop-filter: blur(8px);
        color: #fff;
        font-size: 18px;
        cursor: pointer;
        display: flex; align-items: center; justify-content: center;
        transition: all 0.15s;
    }
    .rotate-btn:active { background: rgba(0,0,0,0.8); transform: scale(0.92); }

    /* Zoom hint */
    .zoom-hint {
        position: absolute;
        bottom: 12px;
        right: 12px;
        background: rgba(0,0,0,0.6);
        backdrop-filter: blur(8px);
        color: var(--text-secondary);
        padding: 6px 10px;
        border-radius: 8px;
        font-size: 11px;
        pointer-events: none;
        text-align: right;
        line-height: 1.5;
        z-index: 10;
    }
    .zoom-hint.hidden { display: none; }

    /* Overlay canvas for swipe */
    #overlayCanvas {
        position: absolute;
        inset: 0;
        z-index: 8;
        display: none;
    }
    #overlayCanvas.active { display: block; }

    /* ─── LOCK BAR ─── */
    .lock-bar {
        flex-shrink: 0;
        display: none;
        align-items: center;
        justify-content: center;
        gap: 10px;
        padding: 10px 16px;
        background: var(--bg-card);
        border-top: 1px solid var(--border);
    }
    .lock-bar.visible { display: flex; }

    .lock-btn {
        flex: 1;
        max-width: 320px;
        padding: 12px 20px;
        border: none;
        border-radius: 10px;
        font-family: 'DM Sans', sans-serif;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.15s;
        display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .lock-btn:active { transform: scale(0.97); }

    .lock-btn.primary {
        background: var(--accent);
        color: #0b1120;
    }
    .lock-btn.unlock {
        background: var(--lock-dim);
        color: var(--lock-color);
        border: 1px solid rgba(251,191,36,0.25);
    }

    /* ─── STATUS BAR ─── */
    .status-bar {
        flex-shrink: 0;
        padding: 6px 16px;
        background: var(--bg-surface);
        border-top: 1px solid var(--border);
        font-family: 'DM Mono', monospace;
        font-size: 11px;
        color: var(--text-muted);
        text-align: center;
    }
    .status-bar .accent { color: var(--accent); }

    /* ─── BOTTOM PANEL (crop preview) — overlaid, not in flow ─── */
    .bottom-panel {
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        background: var(--bg-card);
        border-top: 1px solid var(--border);
        transform: translateY(100%);
        transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
        z-index: 25;
    }
    .bottom-panel.open { transform: translateY(0); }

    .panel-inner { padding: 12px 16px; }
    .panel-header {
        display: flex; align-items: center; justify-content: space-between;
        margin-bottom: 10px;
    }
    .panel-title {
        font-family: 'DM Mono', monospace;
        font-size: 12px;
        color: var(--text-secondary);
        letter-spacing: 0.05em;
    }
    .panel-actions { display: flex; gap: 6px; }
    .pill-btn {
        padding: 6px 14px;
        border-radius: 8px;

        background: var(--bg-surface);

    /* ─── LOCKED OVERLAY ─── */

        transform: translateX(-50%);
        background: rgba(251, 191, 36, 0.15);

        color: var(--lock-color);
        font-family: 'DM Mono', monospace;

        letter-spacing: 0.06em;

    /* Swipe instructions */

<script>
(() => {
    'use strict';

    // ── State ──
    let currentPhase = 1; // 1=Upload, 2=Adjust, 3=Locked, 4=Swipe
    let originalImage = null; // full-res Image object
    let currentScale = 1;
    let translateX = 0, translateY = 0;
    let currentRotation = 0;
    let isDragging = false;
    let dragStartX = 0, dragStartY = 0;
    let lastTouchDist = 0;
    let isLocked = false;

    // Swipe state
    let isDrawing = false;
    let swipePath = [];
    let boundingBox = null;

    // ── Elements ──
    const uploadPrompt   = document.getElementById('uploadPrompt');
    const imageContainer = document.getElementById('imageContainer');
    const imagePreview   = document.getElementById('imagePreview');
    const fileInput      = document.getElementById('fileInput');
    const uploadBtn      = document.getElementById('uploadBtn');
    const rotateControls = document.getElementById('rotateControls');
    const zoomHint       = document.getElementById('zoomHint');
    const overlayCanvas  = document.getElementById('overlayCanvas');
    const ovCtx          = overlayCanvas.getContext('2d');
    const lockedBadge    = document.getElementById('lockedBadge');
    const swipeInstr     = document.getElementById('swipeInstructions');
    const lockBar        = document.getElementById('lockBar');
    const lockBtn        = document.getElementById('lockBtn');
    const statusText     = document.getElementById('statusText');
    const headerSub      = document.getElementById('headerSub');
    const bottomPanel    = document.getElementById('bottomPanel');
    const cropPreview    = document.getElementById('cropPreview');
    const cropCtx        = cropPreview.getContext('2d');
    const undoBtn        = document.getElementById('undoBtn');
    const resetBtn       = document.getElementById('resetBtn');
    const redoSwipeBtn   = document.getElementById('redoSwipeBtn');

    const phases = [
        document.getElementById('phase1'),
        document.getElementById('phase2'),
        document.getElementById('phase3'),
        document.getElementById('phase4')
    ];

    // ── Phase Management ──
    function setPhase(p) {
        currentPhase = p;
        phases.forEach((el, i) => {
            el.classList.remove('active', 'done');
            if (i + 1 < p) el.classList.add('done');
            else if (i + 1 === p) el.classList.add('active');
        });

        // Phase 1: Upload
        uploadPrompt.classList.toggle('hidden', p !== 1);
        imageContainer.classList.toggle('hidden', p < 2);

        // Phase 2: Adjust
        rotateControls.classList.toggle('hidden', p !== 2);
        zoomHint.classList.toggle('hidden', p !== 2);
        lockBar.classList.toggle('visible', p === 2);

        // Phase 3: Locked → auto-advance to 4
        if (p === 3) {
            isLocked = true;
            lockedBadge.classList.add('visible');
            lockBar.classList.add('visible');
            lockBtn.textContent = '🔓 Unlock Image';
            lockBtn.className = 'lock-btn unlock';
            swipeInstr.classList.add('visible');
            overlayCanvas.classList.add('active');
            resizeOverlay();
            headerSub.textContent = 'Swipe across the numbers';
            statusText.innerHTML = '<span class="accent">Locked</span> — swipe over the meter numbers';
            // We treat 3 and 4 together; swipe is enabled once locked
            setPhaseIndicator(4);
        }

        // Phase 2 status
        if (p === 2) {
            isLocked = false;
            lockedBadge.classList.remove('visible');
            swipeInstr.classList.remove('visible');
            overlayCanvas.classList.remove('active');
            lockBtn.textContent = '🔒 Lock Image';
            lockBtn.className = 'lock-btn primary';
            headerSub.textContent = 'Zoom, pan & rotate to frame the numbers';
            statusText.textContent = 'Adjust the image, then lock';
            bottomPanel.classList.remove('open');
            clearSwipe();
        }
    }

    function setPhaseIndicator(p) {
        phases.forEach((el, i) => {
            el.classList.remove('active', 'done');
            if (i + 1 < p) el.classList.add('done');
            else if (i + 1 === p) el.classList.add('active');
        });
    }

    // ── File Upload ──
    uploadBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        fileInput.click();
    });
    fileInput.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (file) loadImage(file);
    });

    function loadImage(file) {
        const reader = new FileReader();
        reader.onload = (e) => {
            const img = new Image();
            img.onload = () => {
                originalImage = img;
                imagePreview.src = img.src;
                // Reset transforms
                currentScale = 1;
                translateX = 0;
                translateY = 0;
                currentRotation = 0;
                updateTransform();
                setPhase(2);
            };
            img.src = e.target.result;
        };
        reader.readAsDataURL(file);
    }

    // ── Transform helpers ──
    function updateTransform() {
        imagePreview.style.transform =
            `rotate(${currentRotation}deg) scale(${currentScale}) translate(${translateX / currentScale}px, ${translateY / currentScale}px)`;
    }

    function resetTransform() {
        currentScale = 1;
        translateX = 0;
        translateY = 0;
        updateTransform();
    }

    // ── Rotate ──
    document.getElementById('rotateLeft').addEventListener('click', () => {
        currentRotation -= 45;
        updateTransform();
    });
    document.getElementById('rotateRight').addEventListener('click', () => {
        currentRotation += 45;
        updateTransform();
    });

    // ── Zoom (wheel) ──
    imageContainer.addEventListener('wheel', (e) => {
        if (isLocked) return;
        e.preventDefault();
        const delta = e.deltaY < 0 ? 0.25 : -0.25;
        currentScale = Math.min(Math.max(currentScale + delta, 1), 6);
        if (currentScale <= 1) { translateX = 0; translateY = 0; }
        updateTransform();
    }, { passive: false });

    // ── Double-tap / double-click reset ──
    let lastTap = 0;
    imageContainer.addEventListener('touchend', (e) => {
        if (isLocked) return;
        const now = Date.now();
        if (now - lastTap < 300 && e.changedTouches.length === 1) {
            e.preventDefault();
            resetTransform();
        }
        lastTap = now;
    });
    imageContainer.addEventListener('dblclick', (e) => {
        if (isLocked) return;
        e.preventDefault();
        resetTransform();
    });

    // ── Touch: pinch zoom + pan (Adjust phase only) ──
    function getTouchDist(a, b) {
        return Math.hypot(a.clientX - b.clientX, a.clientY - b.clientY);
    }

    imageContainer.addEventListener('touchstart', (e) => {
        if (isLocked) return; // swipe handled on overlay
        if (e.touches.length === 2) {
            e.preventDefault();
            lastTouchDist = getTouchDist(e.touches[0], e.touches[1]);
        } else if (e.touches.length === 1 && currentScale > 1) {
            isDragging = true;
            dragStartX = e.touches[0].clientX;
            dragStartY = e.touches[0].clientY;
        }
    }, { passive: false });

    imageContainer.addEventListener('touchmove', (e) => {
        if (isLocked) return;
        if (e.touches.length === 2) {
            e.preventDefault();
            const dist = getTouchDist(e.touches[0], e.touches[1]);
            const ratio = dist / lastTouchDist;
            currentScale = Math.min(Math.max(currentScale * ratio, 1), 6);
            lastTouchDist = dist;
            if (currentScale <= 1) { translateX = 0; translateY = 0; }
            updateTransform();
        } else if (e.touches.length === 1 && isDragging) {
            e.preventDefault();
            const dx = e.touches[0].clientX - dragStartX;
            const dy = e.touches[0].clientY - dragStartY;
            // Rotate delta to match image rotation
            const rad = (currentRotation * Math.PI) / 180;
            translateX += dx * Math.cos(rad) + dy * Math.sin(rad);
            translateY += -dx * Math.sin(rad) + dy * Math.cos(rad);
            dragStartX = e.touches[0].clientX;
            dragStartY = e.touches[0].clientY;
            updateTransform();
        }
    }, { passive: false });

    imageContainer.addEventListener('touchend', () => { isDragging = false; });

    // ── Mouse pan (Adjust, when zoomed) ──
    imageContainer.addEventListener('mousedown', (e) => {
        if (isLocked || currentScale <= 1 || e.detail === 2) return;
        isDragging = true;
        dragStartX = e.clientX;
        dragStartY = e.clientY;
        imageContainer.style.cursor = 'grabbing';
    });
    window.addEventListener('mousemove', (e) => {
        if (!isDragging || isLocked) return;
        const dx = e.clientX - dragStartX;
        const dy = e.clientY - dragStartY;
        const rad = (currentRotation * Math.PI) / 180;
        translateX += dx * Math.cos(rad) + dy * Math.sin(rad);
        translateY += -dx * Math.sin(rad) + dy * Math.cos(rad);
        dragStartX = e.clientX;
        dragStartY = e.clientY;
        updateTransform();
    });
    window.addEventListener('mouseup', () => {
        if (isDragging) {
            isDragging = false;
            imageContainer.style.cursor = '';
        }
    });

    // ── Lock / Unlock ──
    lockBtn.addEventListener('click', () => {
        if (!isLocked) {
            setPhase(3);
        } else {
            setPhase(2);
        }
    });

    // ── Overlay canvas resize ──
    function resizeOverlay() {
        const area = document.getElementById('canvasArea');
        overlayCanvas.width = area.clientWidth;
        overlayCanvas.height = area.clientHeight;
    }
    window.addEventListener('resize', () => { if (isLocked) resizeOverlay(); });

    // ── Swipe drawing on overlay ──
    function getPos(e) {
        const r = overlayCanvas.getBoundingClientRect();
        const touch = e.touches ? e.touches[0] : e;
        return { x: touch.clientX - r.left, y: touch.clientY - r.top };
    }

    overlayCanvas.addEventListener('touchstart', onSwipeStart, { passive: false });
    overlayCanvas.addEventListener('mousedown', onSwipeStart);

    function onSwipeStart(e) {
        if (!isLocked) return;
        e.preventDefault();
        isDrawing = true;
        swipePath = [];
        boundingBox = null;
        bottomPanel.classList.remove('open');
        const p = getPos(e);
        swipePath.push(p);
        drawSwipe();
    }

    overlayCanvas.addEventListener('touchmove', onSwipeMove, { passive: false });
    overlayCanvas.addEventListener('mousemove', onSwipeMove);

    function onSwipeMove(e) {
        if (!isDrawing) return;
        e.preventDefault();
        const p = getPos(e);
        swipePath.push(p);
        drawSwipe();
    }

    overlayCanvas.addEventListener('touchend', onSwipeEnd);
    overlayCanvas.addEventListener('mouseup', onSwipeEnd);

    function onSwipeEnd() {
        if (!isDrawing) return;
        isDrawing = false;
        if (swipePath.length < 5) { clearSwipe(); return; }
        computeBoundingBox();
        drawSwipe();
        cropRegion();
    }

    function drawSwipe() {
        ovCtx.clearRect(0, 0, overlayCanvas.width, overlayCanvas.height);
        if (swipePath.length < 2) return;

        // Draw translucent green band along path
        ovCtx.save();
        ovCtx.lineWidth = 40;
        ovCtx.strokeStyle = 'rgba(52, 211, 153, 0.5)';
        ovCtx.lineCap = 'round';
        ovCtx.lineJoin = 'round';
        ovCtx.beginPath();
        ovCtx.moveTo(swipePath[0].x, swipePath[0].y);
        for (let i = 1; i < swipePath.length; i++) {
            ovCtx.lineTo(swipePath[i].x, swipePath[i].y);
        }
        ovCtx.stroke();
        ovCtx.restore();

        // Draw bounding box if computed
        if (boundingBox) {
            const b = boundingBox;
            ovCtx.save();
            ovCtx.setLineDash([6, 4]);
            ovCtx.strokeStyle = '#34d399';
            ovCtx.lineWidth = 2;
            ovCtx.strokeRect(b.x, b.y, b.w, b.h);

            // Corner markers
            const cLen = 12;
            ovCtx.setLineDash([]);
            ovCtx.lineWidth = 3;
            ovCtx.strokeStyle = '#34d399';
            const corners = [
                [b.x, b.y], [b.x + b.w, b.y],
                [b.x, b.y + b.h], [b.x + b.w, b.y + b.h]
            ];
            corners.forEach(([cx, cy]) => {
                const sx = cx === b.x ? 1 : -1;
                const sy = cy === b.y ? 1 : -1;
                ovCtx.beginPath();
                ovCtx.moveTo(cx + sx * cLen, cy);
                ovCtx.lineTo(cx, cy);
                ovCtx.lineTo(cx, cy + sy * cLen);
                ovCtx.stroke();
            });
            ovCtx.restore();
        }
    }

    function computeBoundingBox() {
        const pad = 20;
        let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
        for (const p of swipePath) {
            if (p.x < minX) minX = p.x;
            if (p.y < minY) minY = p.y;
            if (p.x > maxX) maxX = p.x;
            if (p.y > maxY) maxY = p.y;
        }
        // Expand vertically by stroke width
        const sw = 20; // half of 40px stroke
        boundingBox = {
            x: Math.max(0, minX - pad),
            y: Math.max(0, minY - sw - pad),
            w: Math.min(overlayCanvas.width, maxX + pad) - Math.max(0, minX - pad),
            h: Math.min(overlayCanvas.height, maxY + sw + pad) - Math.max(0, minY - sw - pad)
        };
    }

    // ── Crop from the displayed image ──
    function cropRegion() {
        if (!boundingBox || !originalImage) return;

        const area = document.getElementById('canvasArea');
        const areaRect = area.getBoundingClientRect();
        const imgRect = imagePreview.getBoundingClientRect();

        // Map bounding box (overlay coords) → original image coords
        // The displayed image might be scaled/rotated/translated.
        // We need to figure out where on the original image the bounding box falls.

        // Strategy: render the full transformed image to an offscreen canvas at
        // the same size as the canvas area, then crop from that.
        const offscreen = document.createElement('canvas');
        offscreen.width = areaRect.width * 2; // 2x for quality
        offscreen.height = areaRect.height * 2;
        const octx = offscreen.getContext('2d');
        octx.scale(2, 2);

        // Replicate the CSS transform
        const cx = areaRect.width / 2;
        const cy = areaRect.height / 2;

        // The image is centered in the area via flexbox, then transformed
        const naturalW = originalImage.naturalWidth;
        const naturalH = originalImage.naturalHeight;

        // Compute the "object-fit: contain" display size
        const areaW = areaRect.width;
        const areaH = areaRect.height;
        const ratio = Math.min(areaW / naturalW, areaH / naturalH);
        const dispW = naturalW * ratio;
        const dispH = naturalH * ratio;

        octx.save();
        octx.translate(cx, cy);
        octx.rotate((currentRotation * Math.PI) / 180);
        octx.scale(currentScale, currentScale);
        octx.translate(translateX / currentScale, translateY / currentScale);
        octx.drawImage(originalImage, -dispW / 2, -dispH / 2, dispW, dispH);
        octx.restore();

        // Now crop the bounding box region from the offscreen canvas
        const b = boundingBox;
        const sx = b.x * 2, sy = b.y * 2, sw = b.w * 2, sh = b.h * 2;

        // Upscale 2x for the crop preview
        cropPreview.width = sw;
        cropPreview.height = sh;
        cropCtx.drawImage(offscreen, sx, sy, sw, sh, 0, 0, sw, sh);

        // Apply preprocessing: grayscale + contrast
        const imgData = cropCtx.getImageData(0, 0, sw, sh);
        const d = imgData.data;
        for (let i = 0; i < d.length; i += 4) {
            // Grayscale
            const gray = 0.299 * d[i] + 0.587 * d[i+1] + 0.114 * d[i+2];
            // Contrast stretch
            const stretched = Math.min(255, Math.max(0, (gray - 80) * (255 / 175)));
            // Simple binarization threshold
            const val = stretched > 128 ? 255 : 0;
            d[i] = d[i+1] = d[i+2] = val;
        }
        cropCtx.putImageData(imgData, 0, 0);

        bottomPanel.classList.add('open');
        statusText.innerHTML = 'Region captured — <span class="accent">preview below</span>';
    }

    // ── Clear swipe ──
    function clearSwipe() {
        swipePath = [];
        boundingBox = null;
        if (overlayCanvas.width) ovCtx.clearRect(0, 0, overlayCanvas.width, overlayCanvas.height);
        bottomPanel.classList.remove('open');
    }

    // ── Buttons ──
    undoBtn.addEventListener('click', () => {
        if (isLocked) {
            clearSwipe();
            statusText.innerHTML = '<span class="accent">Locked</span> — swipe over the meter numbers';
        }
    });

    resetBtn.addEventListener('click', () => {
        originalImage = null;
        imagePreview.src = '';
        currentScale = 1;
        translateX = 0;
        translateY = 0;
        currentRotation = 0;
        isLocked = false;
        isDragging = false;
        clearSwipe();
        lockedBadge.classList.remove('visible');
        swipeInstr.classList.remove('visible');
        overlayCanvas.classList.remove('active');
        lockBar.classList.remove('visible');
        fileInput.value = '';
        setPhase(1);
        statusText.textContent = 'Waiting for photo…';
        headerSub.textContent = 'Upload a meter photo';
    });

    redoSwipeBtn.addEventListener('click', () => {
        clearSwipe();
        statusText.innerHTML = '<span class="accent">Locked</span> — swipe again';
    });

    // ── Init ──
    setPhase(1);
})();
</script>
